name: Frontend Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Configure Vercel project
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<'EOF'
          {"projectId":"$VERCEL_PROJECT_ID","orgId":"$VERCEL_ORG_ID"}
          EOF
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        id: vercel-deploy
        run: |
          output=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1)
          echo "$output"
          url=$(printf '%s\n' "$output" | grep -Eo 'https?://[^ ]+' | tail -n 1)
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Show Vercel deployment URL
        run: |
          echo "Vercel deployment URL: ${{ steps.vercel-deploy.outputs.deployment_url }}"
