name: Frontend Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy frontend to Netlify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        id: netlify-deploy
        run: |
          output=$(netlify deploy --dir=dist --prod --site "$NETLIFY_SITE_ID" 2>&1)
          echo "$output"
          url=$(printf '%s\n' "$output" | grep -Eo 'https?://[^ ]+' | tail -n 1)
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Show Netlify deployment URL
        run: |
          echo "Netlify deployment URL: ${{ steps.netlify-deploy.outputs.deployment_url }}"
